<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3f7"/>
      <stop offset="1" stop-color="#dfe8ee"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f9fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fb6a6"/>
      <stop offset="1" stop-color="#159184"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c948"/>
      <stop offset="1" stop-color="#e84545"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#123" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334b5c"/>
    </marker>
    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #14212d; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #526879; }
      .section { font-family: Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #14212d; }
      .text { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #243746; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #5d7182; }
      .white { fill: #ffffff; }
      .chip { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .box { fill: url(#panel); stroke: #b7c5d0; stroke-width: 1.4; rx: 8; filter: url(#shadow); }
      .boxSoft { fill: #fbfdff; stroke: #c8d4dd; stroke-width: 1.2; rx: 8; }
      .line { stroke: #334b5c; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8ba0af; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="80" y="76" class="title">Рисунок 11 — Схема архитектуры программного обеспечения</text>
  <text x="80" y="112" class="subtitle">Автоматизированное определение аномалий георадиолокационных сигналов</text>

  <rect x="70" y="160" width="300" height="250" class="box"/>
  <rect x="95" y="184" width="128" height="34" rx="8" fill="url(#accent)"/>
  <text x="113" y="207" class="chip">Входные данные</text>
  <text x="100" y="255" class="section">Файлы георадара</text>
  <text x="100" y="292" class="text">.gpr, .gpr2</text>
  <text x="100" y="322" class="text">.csv, .txt, .dat</text>
  <text x="100" y="360" class="small">B-scan: трассы × отсчеты</text>

  <rect x="465" y="145" width="330" height="280" class="box"/>
  <rect x="490" y="169" width="150" height="34" rx="8" fill="#334b5c"/>
  <text x="508" y="192" class="chip">Импорт данных</text>
  <rect x="500" y="225" width="250" height="48" class="boxSoft"/>
  <text x="525" y="255" class="text">текстовая матрица</text>
  <rect x="500" y="290" width="250" height="48" class="boxSoft"/>
  <text x="525" y="320" class="text">бинарный int16 / uint16</text>
  <rect x="500" y="355" width="250" height="48" class="boxSoft"/>
  <text x="525" y="385" class="text">бинарный float32</text>

  <rect x="890" y="125" width="340" height="320" class="box"/>
  <rect x="915" y="149" width="166" height="34" rx="8" fill="url(#accent)"/>
  <text x="933" y="172" class="chip">Предобработка</text>
  <text x="925" y="222" class="text">1. Dewow-фильтрация</text>
  <text x="925" y="257" class="text">2. Удаление фона</text>
  <text x="925" y="292" class="text">3. Компенсация затухания</text>
  <text x="925" y="327" class="text">4. Сглаживание шумов</text>
  <text x="925" y="362" class="text">5. Робастная нормализация</text>
  <text x="925" y="405" class="small">Результат: очищенная матрица амплитуд</text>

  <rect x="70" y="530" width="330" height="290" class="box"/>
  <rect x="95" y="554" width="190" height="34" rx="8" fill="#334b5c"/>
  <text x="113" y="577" class="chip">Алгоритм анализа</text>
  <text x="105" y="630" class="text">Расчет карты аномальности:</text>
  <text x="105" y="668" class="section">score = 0.6745 · (|x| − median) / MAD</text>
  <text x="105" y="720" class="text">Пороговая фильтрация</text>
  <text x="105" y="755" class="text">Выделение связных зон</text>
  <text x="105" y="790" class="text">Отбор перспективных областей</text>

  <rect x="495" y="545" width="330" height="260" class="box"/>
  <rect x="520" y="569" width="178" height="34" rx="8" fill="url(#warn)"/>
  <text x="538" y="592" class="chip">Оценка результата</text>
  <text x="530" y="645" class="text">• координаты пика</text>
  <text x="530" y="680" class="text">• границы зоны</text>
  <text x="530" y="715" class="text">• размер и компактность</text>
  <text x="530" y="750" class="text">• уровень уверенности</text>
  <text x="530" y="785" class="text">• текстовое обоснование</text>

  <rect x="915" y="520" width="600" height="330" class="box"/>
  <rect x="940" y="544" width="236" height="34" rx="8" fill="url(#accent)"/>
  <text x="958" y="567" class="chip">Пользовательский интерфейс</text>
  <rect x="950" y="615" width="160" height="140" rx="8" fill="#17212b"/>
  <text x="975" y="654" class="white text">Панель</text>
  <text x="975" y="684" class="white text">управления</text>
  <text x="975" y="720" class="small" fill="#a9b7c6">порог, фильтры</text>
  <rect x="1145" y="615" width="185" height="140" rx="8" fill="#f6f8fb" stroke="#b7c5d0"/>
  <text x="1172" y="654" class="text">B-scan карта</text>
  <text x="1172" y="688" class="small">зоны интереса</text>
  <text x="1172" y="720" class="small">зум и перемещение</text>
  <rect x="1365" y="615" width="115" height="140" rx="8" fill="#ffffff" stroke="#b7c5d0"/>
  <text x="1386" y="654" class="text">Таблица</text>
  <text x="1386" y="688" class="small">score</text>
  <text x="1386" y="720" class="small">увер.</text>
  <text x="950" y="805" class="text">Сохранение отчета с координатами и обоснованием</text>

  <path d="M370 285 C405 285 430 285 465 285" class="line"/>
  <path d="M795 285 C830 285 855 285 890 285" class="line"/>
  <path d="M1060 445 C1060 485 340 485 240 530" class="line"/>
  <path d="M400 675 C440 675 455 675 495 675" class="line"/>
  <path d="M825 675 C865 675 875 675 915 675" class="line"/>
  <path d="M1230 520 C1230 470 1230 455 1230 445" class="dash"/>

  <rect x="1040" y="890" width="475" height="42" rx="8" fill="#ffffff" stroke="#b7c5d0"/>
  <text x="1062" y="917" class="small">Вывод: список перспективных зон для последующей полевой проверки</text>
</svg>
