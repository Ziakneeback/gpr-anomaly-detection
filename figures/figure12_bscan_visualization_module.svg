    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="0.20" stop-color="#cde9e5"/>
      <stop offset="0.38" stop-color="#1fb6a6"/>
      <stop offset="0.55" stop-color="#f7c948"/>
      <stop offset="0.72" stop-color="#e84545"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
