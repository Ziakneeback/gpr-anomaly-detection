    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #14212d; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #526879; }
      .h { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #14212d; }
      .sideTitle { font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #e9f1f7; }
      .sideText { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #a9b7c6; }
      .text { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #243746; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #5d7182; }
      .white { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #ffffff; }
      .window { fill: #e9edf2; stroke: #b7c5d0; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .panel { fill: #ffffff; stroke: #c8d4dd; stroke-width: 1.2; rx: 8; }
      .button { fill: #1fb6a6; rx: 8; }
      .button2 { fill: #f7fafc; stroke: #c8d4dd; rx: 8; }
      .zone { fill: none; stroke: #ffd166; stroke-width: 4; stroke-dasharray: 10 7; }
      .cross { stroke: #17212b; stroke-width: 3; }
      .grid { stroke: #dbe4eb; stroke-width: 1; }
